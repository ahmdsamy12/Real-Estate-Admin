[variables]
NIXPACKS_PHP_VERSION = "8.3"
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.mbstring",
  "php83Extensions.curl",
  "php83Extensions.fileinfo",
  "php83Extensions.tokenizer",
  "php83Extensions.pdo",
  "php83Extensions.xml",
  "php83Extensions.dom",
  "php83Extensions.session",
  "php83Extensions.ctype",
  "php83Extensions.zip",
  "nodejs_20",
  "nodePackages.npm",
  "composer"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs",
  "npm ci",
  "npm run build",
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data bootstrap/cache",
  "chmod -R 777 storage bootstrap/cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
